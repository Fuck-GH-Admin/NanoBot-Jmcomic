client:
  cache: null
  domain:
    api:
    - www.cdnhth.club
    - www.cdngwc.cc
    - www.cdnhth.net
    - www.cdnbea.net
    - www.cdn-mspjmapiproxy.xyz
    html:
    - 18comic.vip
    - 18comic.org
    - jmcomic.me
    - jmcomic1.me
    - jm-comic.cloud
  impl: api
  postman:
    meta_data:
      headers:
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
        Referer: https://18comic.vip/
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
          like Gecko) Chrome/120.0.0.0 Safari/537.36
      impersonate: chrome
    type: curl_cffi
  retry_times: 5
  timeout: 30
dir_rule:
  base_dir: C:\Users\Bot\Bot\JmDownload\data
  normalize_zh: true
  rule: Bd / {Aid}_{Pid}_{Pindex}_{Ptitle}
download:
  cache: true
  image:
    decode: true
    quality: 100
    suffix: .png
  retry_times: 3
  threading:
    image: 20
    photo: 4
  timeout: 60
log: true
plugins:
  config:
    log_level: INFO
    save_path: C:\Users\Bot\Bot\JmDownload\logs
  valid: log,debug
version: '2.1'
